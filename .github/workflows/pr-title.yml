name: PR Title

on:
  pull_request:
    types:
      - opened
      - edited
      - reopened
      - synchronize

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  pull-requests: read

jobs:
  validate:
    name: Validate PR Title
    runs-on: ubuntu-latest

    steps:
      - name: Check Conventional Commit title
        # covers: jido_action.package.pr_title_gate
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          set -euo pipefail

          pattern='^(feat|fix|improvement|perf|refactor|build|chore|ci|deps|docs|style|test)(\([[:alnum:]_.\/-]+\))?(!)?: .+$'

          if [[ "$PR_TITLE" =~ $pattern ]]; then
            echo "PR title is a valid Conventional Commit: $PR_TITLE"
            exit 0
          fi

          echo "::error title=Invalid PR title::PR titles must follow Conventional Commit format, for example 'fix(exec): handle linked worktrees'."
          echo "::error title=Allowed types::feat, fix, improvement, perf, refactor, build, chore, ci, deps, docs, style, test."
          exit 1
